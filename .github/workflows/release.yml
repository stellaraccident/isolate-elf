name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Run the full test suite before publishing
  test:
    name: Test before release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential binutils ninja-build meson pkg-config \
            autoconf automake libtool gettext autopoint

      - name: Install isolib + pytest
        run: pip install -e . pytest

      - name: Cache sysdep sources and builds
        uses: actions/cache@v4
        with:
          path: .cache/isolib
          key: isolib-sysdeps-${{ hashFiles('integration/test_*.py') }}
          restore-keys: |
            isolib-sysdeps-

      - name: Run all tests
        run: python -m pytest tests/ integration/ -v --tb=short

  build:
    name: Build sdist and wheel
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/isolib-*.whl
          isolib --help
          python -c "import isolib; print(f'Version: {isolib.__version__}')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
